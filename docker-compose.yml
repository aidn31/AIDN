version: '3.8'

services:
  # PostgreSQL with AIDN schema
  postgres:
    image: postgres:15
    container_name: aidn_postgres
    environment:
      POSTGRES_USER: aidnuser
      POSTGRES_PASSWORD: aidnpass123
      POSTGRES_DB: aidn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/shared/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidnuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AIDN Voice Agent
  voice-agent:
    build:
      context: .
      dockerfile: Dockerfile.voice
    container_name: aidn_voice_agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://aidnuser:aidnpass123@postgres:5432/aidn
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      SIP_OUTBOUND_TRUNK_ID: ${SIP_OUTBOUND_TRUNK_ID}
      LOG_LEVEL: INFO
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./.env:/app/.env
    command: ["uv", "run", "python", "-m", "src.voice_agent.main"]
    restart: unless-stopped
    ports:
      - "8080:8080"  # For health checks

  # AIDN Dashboard (Streamlit for prototype)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: aidn_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://aidnuser:aidnpass123@postgres:5432/aidn
      STREAMLIT_SERVER_PORT: 8501
    ports:
      - "8501:8501"
    volumes:
      - ./.env:/app/.env
      - ./uploads:/app/uploads  # For lead file uploads
    command: ["streamlit", "run", "src/dashboard_agent/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped

volumes:
  postgres_data: